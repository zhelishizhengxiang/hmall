server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 192.168.95.100:8848
    gateway:
      # 网关路由配置
      routes:
        - id: item-service
          uri: lb://item-service
          predicates:
            # 可以使用长断言，也可以使用短断言使用=链接
#            - args: Path
#              name: /items/**
#            - args: Path
#              name: /search/**
            - Path=/items/**,/search/**
        - id: cart
          uri: lb://cart-service
          predicates:
            - Path=/carts/**
        - id: user
          uri: lb://user-service
          predicates:
            - Path=/users/**,/addresses/**
        - id: trade
          uri: lb://trade-service
          predicates:
            - Path=/orders/**
        - id: pay
          uri: lb://pay-service
          predicates:
            - Path=/pay-orders/**
      default-filters:
        - PrintAny=1,2,3

hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    # 密钥文件本身也是加密的，所以需要密码才能够解析密钥文件
    password: hmall123
    tokenTTL: 30m
  auth:
    # 不需要登陆即可访问的路径，比如登录请求的路径等
    excludePaths:
      - /search/**
      - /users/login
      - /items/**
      - /hi